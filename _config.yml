# Site settings


# Theme (natively supported by GitHub Pages — no build setup needed)
theme: minima

# Navigation: which pages appear in the header menu, in this order
header_pages:
  - research.md
  - publications.md
  - teaching.md
  - cv.md

# Minima theme settings
minima:
 

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
